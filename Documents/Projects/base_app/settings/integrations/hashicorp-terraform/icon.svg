<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="terraform-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C4EE5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B42BC;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="50" cy="50" r="45" fill="url(#terraform-gradient)"/>
  <!-- Terraform logo inspired design -->
  <!-- Left triangle -->
