<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="utm-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background with Apple style -->
  <rect width="100" height="100" rx="22" fill="url(#utm-gradient)"/>
  <!-- UTM letters in white -->
  <text x="50" y="65" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">UTM</text>
  <!-- Top decoration -->
  <circle cx="50" cy="25" r="8" fill="white" opacity="0.9"/>
  <circle cx="35" cy="30" r="5" fill="white" opacity="0.7"/>
  <circle cx="65" cy="30" r="5" fill="white" opacity="0.7"/>
</svg>
